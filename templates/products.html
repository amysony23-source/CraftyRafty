<!DOCTYPE html>
<html>
<head><title>CraftyRafty Products</title></head>
<body>
  <h2>Craft Products</h2>
  <form method="GET">
    <input name="search" value="{{ search }}" placeholder="Search products...">
    <button type="submit">Search</button>
  </form>
  <ul>
    {% for p in products %}
    <li>{{ p[1] }} — ${{ p[2] }}: {{ p[3] }}</li>
    {% endfor %}
  </ul>
  <a href="/logout">Logout</a>
</body>
</html>
